# ============================================
# 律植 - Docker Compose 配置
# 生产环境：数据库使用阿里云 RDS/PolarDB，不依赖 Supabase
# 构建前请确保 deploy/.env 存在。Compose 默认只加载与本文件同目录的 `.env` 做变量替换；
# 若 build.args 需从 deploy/.env 读取 NEXT_PUBLIC_*，请执行：
#   docker compose --env-file deploy/.env build && docker compose --env-file deploy/.env up -d
# 宿主机 80/443 已被占用时，在 deploy/.env 中设置：
#   NGINX_HTTP_PORT=8080
#   NGINX_HTTPS_PORT=8443
# ============================================

services:
  # --- PostgreSQL (本地开发兜底) ---
  postgres:
    image: postgres:16-alpine
    container_name: lvzhi-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-lvzhi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-lvzhi_dev_password}
      - POSTGRES_DB=${POSTGRES_DB:-lvzhi}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lvzhi} -d ${POSTGRES_DB:-lvzhi}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lvzhi-network

  # --- Web 前端 (Next.js) ---
  # 生产：镜像推送到 ACR 仓库 lvzhi（与 GitHub 构建一致）；本地开发可 docker compose build web
  web:
    image: crpi-aalux2tdca5t1zgj.cn-shanghai.personal.cr.aliyuncs.com/lvzhi_01/lvzhi:${IMAGE_TAG:-latest}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://www.lvxzhi.com/api}
    container_name: lvzhi-web
    restart: unless-stopped
    env_file:
      - path: ./deploy/.env
        required: true
      - path: ./.env.docker
        required: false
    # 仅集群内访问，由 nginx 反代；避免与宿主机已占用端口冲突
    expose:
      - "3000"
    environment:
      # 前端运行时 API 地址
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:3001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - lvzhi-network

  # --- API 服务 (Fastify) ---
  api:
    image: crpi-aalux2tdca5t1zgj.cn-shanghai.personal.cr.aliyuncs.com/lvzhi_01/lvzhi-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://www.lvxzhi.com/api}
    container_name: lvzhi-api
    restart: unless-stopped
    env_file:
      - path: ./deploy/.env
        required: true
      - path: ./.env.docker
        required: false
    ports:
      - "3001:3001"
    expose:
      - "3001"
    environment:
      # 密钥从 deploy/.env 注入（env_file）
      - NODE_ENV=production
      - PORT=3001
      - RATE_LIMIT_MAX=10000
    # 已移除 postgres 依赖，使用阿里云 PolarDB
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/health', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - lvzhi-network

  # --- Nginx 反向代理 ---
  nginx:
    image: crpi-aalux2tdca5t1zgj.cn-shanghai.personal.cr.aliyuncs.com/lvzhi_01/lvzhi-nginx:${IMAGE_TAG:-latest}
    pull_policy: if_not_present
    container_name: lvzhi-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - ./deploy/ssl/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - lvzhi-network
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  nginx-logs:
  postgres-data:

networks:
  lvzhi-network:
    driver: bridge
