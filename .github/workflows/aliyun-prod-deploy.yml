name: Aliyun Production Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "继续执行线上部署（需人工审批）"
        required: true
        default: "yes"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-production:
    if: github.event_name == 'push' || github.event.inputs.run_deploy == 'yes'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy on ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT || 22 }}
          script: |
            set -euo pipefail
            export APP_DIR="${{ secrets.ECS_APP_DIR || '/opt/lvzhi' }}"
            if [ -n "${{ secrets.ECS_ENV_FILE }}" ]; then
              export ENV_FILE="${{ secrets.ECS_ENV_FILE }}"
            else
              export ENV_FILE="${APP_DIR}/deploy/.env"
            fi

            cd "${APP_DIR}"
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main

            if [ ! -f "${ENV_FILE}" ]; then
              echo "Missing env file: ${ENV_FILE}"
              exit 1
            fi

            # 生产部署固定 80/443，并避免宿主机 nginx 抢占端口
            sed -i 's/^NGINX_HTTP_PORT=.*/NGINX_HTTP_PORT=80/' "${ENV_FILE}"
            sed -i 's/^NGINX_HTTPS_PORT=.*/NGINX_HTTPS_PORT=443/' "${ENV_FILE}"
            systemctl stop nginx || true
            systemctl disable nginx || true

            # ECS 国内网络不稳定时，关闭 buildkit 更稳
            export DOCKER_BUILDKIT=0
            export COMPOSE_DOCKER_CLI_BUILD=0
            docker compose --env-file "${ENV_FILE}" build web admin api nginx
            docker compose --env-file "${ENV_FILE}" up -d web admin api nginx
            docker compose --env-file "${ENV_FILE}" ps
