name: Aliyun Production Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "继续执行线上部署（需人工审批）"
        required: true
        default: "yes"

permissions:
  contents: read

env:
  IMAGE_TAG: ${{ github.sha }}
  REGISTRY: ${{ secrets.ACR_REGISTRY }}
  WEB_IMAGE: ${{ secrets.ACR_REGISTRY }}/lvzhi_01/lvzhi
  API_IMAGE: ${{ secrets.ACR_REGISTRY }}/lvzhi_01/lvzhi-api
  NGINX_IMAGE: ${{ secrets.ACR_REGISTRY }}/lvzhi_01/lvzhi-nginx

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: web-runner
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://www.lvxzhi.com/api
          tags: |
            ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.WEB_IMAGE }}:latest

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: api-runner
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://www.lvxzhi.com/api
          tags: |
            ${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.API_IMAGE }}:latest

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: nginx
          push: true
          tags: |
            ${{ env.NGINX_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.NGINX_IMAGE }}:latest

  deploy-production:
    if: github.event_name == 'push' || github.event.inputs.run_deploy == 'yes'
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy on ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT || 22 }}
          script: |
            set -euo pipefail
            export APP_DIR="${{ secrets.ECS_APP_DIR || '/opt/lvzhi' }}"
            if [ -n "${{ secrets.ECS_ENV_FILE }}" ]; then
              export ENV_FILE="${{ secrets.ECS_ENV_FILE }}"
            fi
            echo "${{ secrets.ACR_PASSWORD }}" | docker login "${{ env.REGISTRY }}" -u "${{ secrets.ACR_USERNAME }}" --password-stdin
            "${APP_DIR}/deploy/update-from-registry.sh" "${{ env.IMAGE_TAG }}"
