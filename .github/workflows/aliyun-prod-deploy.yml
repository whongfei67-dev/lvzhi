name: Aliyun Production Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "继续执行线上部署（需人工审批）"
        required: true
        default: "yes"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AUTO_ROLLBACK_ON_HEALTH_FAIL: ${{ vars.AUTO_ROLLBACK_ON_HEALTH_FAIL || 'false' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      web_image: ${{ steps.images.outputs.web_image }}
      api_image: ${{ steps.images.outputs.api_image }}
      admin_image: ${{ steps.images.outputs.admin_image }}
      nginx_image: ${{ steps.images.outputs.nginx_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Normalize image repositories
        id: images
        run: |
          set -euo pipefail
          registry="$(
            grep -E '^\s*image:\s*.+/lvzhi_01/lvzhi([:-]|$)' docker-compose.yml \
            | head -n1 \
            | sed -E 's#^\s*image:\s*([^/]+)/.*#\1#'
          )"
          if [ -z "$registry" ]; then
            registry="${{ secrets.ACR_REGISTRY }}"
            registry="${registry#http://}"
            registry="${registry#https://}"
            registry="${registry%%/*}"
            registry="${registry%/}"
          fi
          echo "registry_host=${registry}" >> "$GITHUB_OUTPUT"
          echo "web_image=${registry}/lvzhi_01/lvzhi" >> "$GITHUB_OUTPUT"
          echo "api_image=${registry}/lvzhi_01/lvzhi-api" >> "$GITHUB_OUTPUT"
          echo "admin_image=${registry}/lvzhi_01/lvzhi-admin" >> "$GITHUB_OUTPUT"
          echo "nginx_image=${registry}/lvzhi_01/lvzhi-nginx" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.images.outputs.registry_host }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Web image
        shell: bash
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            echo "[retry] web build/push attempt ${i}/3"
            if docker buildx build \
              --file ./Dockerfile \
              --target web-runner \
              --tag "${{ steps.images.outputs.web_image }}:${{ steps.meta.outputs.tag }}" \
              --tag "${{ steps.images.outputs.web_image }}:latest" \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              --push .; then
              exit 0
            fi
            sleep $((i * 10))
          done
          echo "[retry] web build/push failed after 3 attempts"
          exit 1

      - name: Build and push API image
        shell: bash
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            echo "[retry] api build/push attempt ${i}/3"
            if docker buildx build \
              --file ./Dockerfile \
              --target api-runner \
              --tag "${{ steps.images.outputs.api_image }}:${{ steps.meta.outputs.tag }}" \
              --tag "${{ steps.images.outputs.api_image }}:latest" \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              --push .; then
              exit 0
            fi
            sleep $((i * 10))
          done
          echo "[retry] api build/push failed after 3 attempts"
          exit 1

      - name: Build and push Admin image
        shell: bash
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            echo "[retry] admin build/push attempt ${i}/3"
            if docker buildx build \
              --file ./Dockerfile \
              --target admin-runner \
              --tag "${{ steps.images.outputs.admin_image }}:${{ steps.meta.outputs.tag }}" \
              --tag "${{ steps.images.outputs.admin_image }}:latest" \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              --push .; then
              exit 0
            fi
            sleep $((i * 10))
          done
          echo "[retry] admin build/push failed after 3 attempts"
          exit 1

      - name: Build and push Nginx image
        shell: bash
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            echo "[retry] nginx build/push attempt ${i}/3"
            if docker buildx build \
              --file ./Dockerfile \
              --target nginx \
              --tag "${{ steps.images.outputs.nginx_image }}:${{ steps.meta.outputs.tag }}" \
              --tag "${{ steps.images.outputs.nginx_image }}:latest" \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              --push .; then
              exit 0
            fi
            sleep $((i * 10))
          done
          echo "[retry] nginx build/push failed after 3 attempts"
          exit 1

  deploy-production:
    needs: [build-and-push]
    if: github.event_name == 'push' || github.event.inputs.run_deploy == 'yes'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy on ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT || 22 }}
          script: |
            set -euo pipefail
            export APP_DIR="${{ secrets.ECS_APP_DIR || '/opt/lvzhi' }}"
            export RUN_SHA="${{ github.sha }}"
            if [ -n "${{ secrets.ECS_ENV_FILE }}" ]; then
              export ENV_FILE="${{ secrets.ECS_ENV_FILE }}"
            else
              export ENV_FILE="${APP_DIR}/deploy/.env"
            fi

            cd "${APP_DIR}"
            git fetch --all --prune
            # 清理部署脚本可能产生的本地变更，避免 checkout 被阻塞
            git restore deploy/disk-preflight.sh deploy/docker-cleanup.sh deploy/install-maintenance-cron.sh deploy/update-on-ecs.sh 2>/dev/null || true
            git clean -fd deploy/.history 2>/dev/null || true
            git checkout --detach "${RUN_SHA}"

            if [ ! -f "${ENV_FILE}" ]; then
              echo "Missing env file: ${ENV_FILE}"
              exit 1
            fi

            chmod +x deploy/update-from-registry.sh deploy/rollback-to-previous.sh deploy/disk-preflight.sh || true

            # 生产部署固定 80/443，并避免宿主机 nginx 抢占端口
            sed -i 's/^NGINX_HTTP_PORT=.*/NGINX_HTTP_PORT=80/' "${ENV_FILE}"
            sed -i 's/^NGINX_HTTPS_PORT=.*/NGINX_HTTPS_PORT=443/' "${ENV_FILE}"
            systemctl stop nginx || true
            systemctl disable nginx || true

            DEPLOY_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            "${APP_DIR}/deploy/update-from-registry.sh" "${DEPLOY_TAG}"

            health_check() {
              local url="$1"
              local max_retry="${2:-18}"
              local wait_seconds="${3:-5}"
              local i=1
              while [ "$i" -le "$max_retry" ]; do
                code="$(curl -k -sS -o /dev/null -w "%{http_code}" "$url" || true)"
                if [ "$code" = "200" ] || [ "$code" = "302" ]; then
                  echo "[health] ok $url ($code)"
                  return 0
                fi
                echo "[health] retry $i/$max_retry $url ($code)"
                sleep "$wait_seconds"
                i=$((i + 1))
              done
              echo "[health] failed $url"
              return 1
            }

            if ! health_check "https://www.lvxzhi.com/" 18 5 \
              || ! health_check "https://www.lvxzhi.com/admin" 18 5 \
              || ! health_check "https://www.lvxzhi.com/api/health" 18 5; then
              if [ "${{ env.AUTO_ROLLBACK_ON_HEALTH_FAIL }}" = "true" ]; then
                echo "[deploy] health check failed, auto rollback enabled"
                "${APP_DIR}/deploy/rollback-to-previous.sh"
                docker compose --env-file "${ENV_FILE}" ps
                health_check "https://www.lvxzhi.com/" 18 5
                health_check "https://www.lvxzhi.com/admin" 18 5
                health_check "https://www.lvxzhi.com/api/health" 18 5
              else
                echo "[deploy] health check failed, auto rollback disabled"
                docker compose --env-file "${ENV_FILE}" ps
                exit 1
              fi
            fi

            docker compose --env-file "${ENV_FILE}" ps
