name: Recommendation Parser Check

on:
  pull_request:
    paths:
      - "apps/web/lib/recommendation/**"
      - "scripts/test-recommendation-parser.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/recommendation-parser-check.yml"
  workflow_dispatch:

jobs:
  parser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.16.1 --activate
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run parser smoke checks
        run: pnpm test:recommendation:parser
