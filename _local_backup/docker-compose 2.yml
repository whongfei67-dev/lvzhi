# ============================================
# 律植 - Docker Compose 配置
# 本地开发 / 生产环境部署
# ============================================

services:
  # --- Web 前端 (Next.js) ---
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runner
    container_name: lvzhi-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:3001
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - lvzhi-network

  # --- API 服务 (Fastify) ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
    container_name: lvzhi-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      # AI 服务配置（替换为国内服务）
      - AI_PROVIDER=${AI_PROVIDER:-zhipu}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - ZHIPU_BASE_URL=${ZHIPU_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      # 阿里云通义千问（备选）
      # - AI_PROVIDER=dashscope
      # - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - lvzhi-network

  # --- Nginx 反向代理 ---
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    container_name: lvzhi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - web
      - api
    networks:
      - lvzhi-network

  # --- Redis 缓存 ---
  redis:
    image: redis:7-alpine
    container_name: lvzhi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - lvzhi-network

  # --- PostgreSQL 数据库 ---
  postgres:
    image: postgres:16-alpine
    container_name: lvzhi-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=lvzhi
      - POSTGRES_USER=${POSTGRES_USER:-lvzhi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - lvzhi-network

volumes:
  redis-data:
  postgres-data:
  nginx-logs:

networks:
  lvzhi-network:
    driver: bridge
