# ============================================
# 律植 - 本地构建覆盖层
# 用法（仅本地/调试）:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build web
# 生产 ECS 请使用 docker-compose.yml（拉镜像），避免误触全量本机构建。
# ============================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://www.lvxzhi.com/api}

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://www.lvxzhi.com/api}

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin-runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://www.lvxzhi.com/api}
