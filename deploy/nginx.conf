# ============================================
# 律植 - Nginx 反向代理配置
# 适用于国内云服务器部署
# ============================================

# Docker DNS 解析器 - 解决服务启动顺序问题
resolver 127.0.0.11 valid=30s;
resolver_timeout 5s;

upstream lvzhi_web {
    server lvzhi-web:3000;
    keepalive 32;
}

upstream lvzhi_api {
    server lvzhi-api:3001;
    keepalive 32;
}

# 限制请求体大小
client_max_body_size 10M;

# Gzip 压缩
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml application/wasm;

# IP 限流
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=web_limit:10m rate=30r/s;

# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name www.lvxzhi.com lvxzhi.com _;

    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://www.lvxzhi.com$request_uri;
    }
}

# HTTPS 主站点
server {
    listen 443 ssl;
    http2 on;
    server_name www.lvxzhi.com lvxzhi.com;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/lvzhi.access.log;
    error_log /var/log/nginx/lvzhi.error.log;

    # 静态资源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        limit_req zone=web_limit burst=50 nodelay;
        proxy_pass http://lvzhi_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Web 前端 (Next.js)
    location / {
        limit_req zone=web_limit burst=50 nodelay;
        proxy_pass http://lvzhi_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API 服务 (Fastify)
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://lvzhi_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(\.env|\.git|\.hg|\.svn|README|README\.md|\.gitignore) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
