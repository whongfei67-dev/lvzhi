# ============================================
# 律植 - Nginx 反向代理配置
# 适用于国内云服务器部署
# ============================================

upstream lvzhi_web {
    server web:3000;
    keepalive 32;
}

upstream lvzhi_api {
    server api:3001;
    keepalive 32;
}

# 限制请求体大小
client_max_body_size 10M;

# Gzip 压缩
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml application/wasm;

# IP 限流
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=web_limit:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    # HTTP 重定向到 HTTPS（生产环境建议开启）
    # return 301 https://$host$request_uri;

    # 日志
    access_log /var/log/nginx/lvzhi.access.log;
    error_log /var/log/nginx/lvzhi.error.log;

    # ---- Web 前端 (Next.js) ----
    location / {
        limit_req zone=web_limit burst=50 nodelay;

        proxy_pass http://lvzhi_web;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Next.js 特殊头
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://lvzhi_web;
            proxy_cache_valid 200 1d;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---- API 服务 (Fastify) ----
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://lvzhi_api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # CORS 头（根据需要调整）
        # add_header Access-Control-Allow-Origin $http_origin always;
        # add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        # add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        # 超时设置
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ---- 静态文件目录 ----
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---- 健康检查端点 ----
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ---- 禁止访问的路径 ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(\.env|\.git|\.hg|\.svn|README|README\.md|\.gitignore) {
        deny all;
        access_log off;
        log_not_found off;
    }
}

