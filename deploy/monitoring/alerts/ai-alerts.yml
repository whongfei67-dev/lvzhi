groups:
  - name: ai-alerts
    interval: 30s
    rules:
      # AI 调用失败率过高
      - alert: AIHighFailureRate
        expr: rate(ai_calls_total{status="failed"}[10m]) / rate(ai_calls_total[10m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: lvzhi-ai
        annotations:
          summary: "AI 调用失败率过高"
          description: "AI 调用失败率 {{ $value | printf \"%.2f\" }}%，超过 10% 阈值"

      # AI 响应超时
      - alert: AIResponseTimeout
        expr: rate(ai_calls_total{status="timeout"}[5m]) / rate(ai_calls_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: lvzhi-ai
        annotations:
          summary: "AI 响应超时率过高"
          description: "AI 响应超时率 {{ $value | printf \"%.2f\" }}%，超过 5% 阈值"

      # AI 配额告警
      - alert: AIQuotaWarning
        expr: ai_quota_usage / ai_quota_limit > 0.8
        for: 10m
        labels:
          severity: warning
          service: lvzhi-ai
        annotations:
          summary: "AI 配额使用超过 80%"
          description: "AI 配额已使用 {{ $value | printf \"%.0f\" }}%"

      # AI 费用异常
      - alert: AIHighCost
        expr: increase(ai_call_cost_total[1h]) > 1000
        for: 5m
        labels:
          severity: warning
          service: lvzhi-ai
        annotations:
          summary: "AI 费用异常增长"
          description: "过去 1 小时 AI 费用增长 ¥{{ $value | printf \"%.2f\" }}"

      # AI 服务不可用
      - alert: AIServiceDown
        expr: sum(rate(ai_calls_total[5m])) == 0 and sum(rate(ai_calls_total[5m])) == 0
        for: 10m
        labels:
          severity: critical
          service: lvzhi-ai
        annotations:
          summary: "AI 服务无响应"
          description: "过去 10 分钟无 AI 调用，可能服务异常"
