# ============================================
# 律植 - Nginx 配置 (生产环境 HTTPS)
# 位置: /etc/nginx/conf.d/lvzhi.conf
# 
# 前提条件:
#   1. 申请 SSL 证书 (Let's Encrypt 或阿里云)
#   2. 证书路径: 
#      - /etc/nginx/ssl/lvzhi.crt
#      - /etc/nginx/ssl/lvzhi.key
#   3. 执行: nginx -t && nginx -s reload
# ============================================

upstream lvzhi_api {
    server 127.0.0.1:3001;
    keepalive 64;
}

upstream lvzhi_web {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name www.lvxzhi.com lvxzhi.com;  # 修改为你的正式域名
    
    # Let's Encrypt 证书验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # 其他请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl http2;
    server_name www.lvxzhi.com lvxzhi.com;  # 修改为你的正式域名
    
    # SSL 配置
    ssl_certificate /etc/nginx/ssl/lvzhi.crt;
    ssl_certificate_key /etc/nginx/ssl/lvzhi.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 日志
    access_log /var/log/nginx/lvzhi-access.log;
    error_log /var/log/nginx/lvzhi-error.log;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # API 代理
    location /api {
        proxy_pass http://lvzhi_api;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Next.js 静态文件缓存
    location /_next/static {
        proxy_pass http://lvzhi_web;
        proxy_cache_valid 200 60m;
        proxy_cache_valid 404 1m;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 静态资源
    location /static {
        proxy_pass http://lvzhi_web;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=86400";
    }

    # Web 应用
    location / {
        proxy_pass http://lvzhi_web;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 健康检查
    location /health {
        proxy_pass http://lvzhi_api;
        access_log off;
    }
}
