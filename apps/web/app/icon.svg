<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Pot -->
  <path d="M40 85 L35 110 C34 115 36 120 41 120 L87 120 C92 120 94 115 93 110 L88 85 Z"
        fill="#E8DCC8" stroke="#C4B5A0" stroke-width="2"/>

  <!-- Pot rim -->
  <ellipse cx="64" cy="85" rx="26" ry="6" fill="#D4C5B0"/>

  <!-- Soil -->
  <ellipse cx="64" cy="85" rx="24" ry="5" fill="#8B7355"/>

  <!-- Main stem -->
  <path d="M64 85 Q64 70 64 55"
        stroke="#4A7C59" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Left leaf 1 -->
  <path d="M64 70 Q50 65 45 68 Q48 72 64 75 Z"
