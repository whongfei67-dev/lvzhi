  <!-- Left leaf 2 -->
  <path d="M64 60 Q48 58 42 62 Q45 66 64 65 Z"
        fill="#6FCF97" stroke="#4A7C59" stroke-width="1.5"/>

  <!-- Right leaf 2 -->
  <path d="M64 60 Q80 58 86 62 Q83 66 64 65 Z"
        fill="#5FB878" stroke="#4A7C59" stroke-width="1.5"/>

  <!-- Top leaves (律 character shape inspired) -->
  <path d="M64 55 Q52 48 48 52 Q51 56 64 58 Z"
        fill="#7FD99A" stroke="#4A7C59" stroke-width="1.5"/>

  <path d="M64 55 Q76 48 80 52 Q77 56 64 58 Z"
        fill="#7FD99A" stroke="#4A7C59" stroke-width="1.5"/>

  <!-- Center top leaf -->
