           fill="#8FE9AA" stroke="#4A7C59" stroke-width="1.5"/>

  <!-- Cute sparkles -->
  <circle cx="45" cy="50" r="2" fill="#FFE66D" opacity="0.8"/>
  <circle cx="83" cy="55" r="2" fill="#FFE66D" opacity="0.8"/>
  <circle cx="70" cy="42" r="1.5" fill="#FFE66D" opacity="0.8"/>
